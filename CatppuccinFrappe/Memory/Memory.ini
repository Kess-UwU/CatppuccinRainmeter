; ============================================================
; CatppuccinFrappe - Memory.ini  (v1.3)
; RAM Memory Information - Catppuccin Frappe Theme
; Change: Removed "RAM" label from ring, bigger % text,
;         page file row fully contained with clipping
; ============================================================

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Memory
Author=CatppuccinFrappe
Version=1.3

[Variables]

; ============================================================
; Background
; ============================================================
[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,300,200,8 | Fill Color 48,52,70,220 | StrokeWidth 1 | Stroke Color 81,87,109,255
X=0
Y=0

; ============================================================
; Section Label
; ============================================================
[MeterSectionLabel]
Meter=String
Text=MEMORY
FontFace=JetBrains Mono
FontSize=8
FontColor=115,121,148,255
SolidColor=0,0,0,0
X=20
Y=14
AntiAlias=1

[MeterAccentLine]
Meter=Shape
Shape=Line 20,32,280,32 | StrokeWidth 1 | Stroke Color 186,187,241,60
X=0
Y=0

; ============================================================
; Measures
; PhysicalMemory (default) = bytes used
; Calc gives guaranteed 0-100% value
; ============================================================
[MeasureRAMUsed]
Measure=PhysicalMemory

[MeasureRAMFree]
Measure=PhysicalMemory
Type=Free

[MeasureRAMTotal]
Measure=PhysicalMemory
Total=1

[MeasureRAMPct]
Measure=Calc
Formula=(MeasureRAMUsed / MeasureRAMTotal) * 100
MaxValue=100
MinValue=0

[MeasurePagePct]
Measure=SwapMemory
Type=Percent
MaxValue=100
MinValue=0

; ============================================================
; Donut Ring
; ============================================================
[MeterRingBg]
Meter=Shape
Shape=Arc 62,62,54,54,0,359.9 | StrokeWidth 9 | Stroke Color 65,69,89,255 | Fill Color 0,0,0,0
X=23
Y=32

[MeterRingFill]
Meter=Shape
MeasureName=MeasureRAMPct
Shape=Arc 62,62,54,54,270,(270+(MeasureRAMPct*3.6)) | StrokeWidth 9 | Stroke Color 186,187,241,255 | Fill Color 0,0,0,0
X=23
Y=32
Dynamic=1

; Dark fill inside ring — no label, just clean background for the %
[MeterRingInner]
Meter=Shape
Shape=Ellipse 62,62,40,40 | Fill Color 41,44,60,255 | StrokeWidth 0
X=23
Y=32

; ============================================================
; Percentage — large, centered, NO label behind/under it
; ============================================================
[MeterRamPct]
Meter=String
MeasureName=MeasureRAMPct
FontFace=JetBrains Mono
FontSize=20
FontColor=198,208,245,255
SolidColor=0,0,0,0
X=85
Y=75
StringAlign=Center
AntiAlias=1
NumOfDecimals=0
Text=%1%

; ============================================================
; Used / Free stats — right panel
; ============================================================
[MeterUsedLabel]
Meter=String
Text=USED
FontFace=JetBrains Mono
FontSize=7
FontColor=115,121,148,255
SolidColor=0,0,0,0
X=165
Y=50
AntiAlias=1

[MeterUsedValue]
Meter=String
MeasureName=MeasureRAMUsed
FontFace=JetBrains Mono
FontSize=15
FontColor=186,187,241,255
SolidColor=0,0,0,0
X=165
Y=62
AntiAlias=1
AutoScale=1
NumOfDecimals=1
Text=%1B

[MeterFreeLabel]
Meter=String
Text=FREE
FontFace=JetBrains Mono
FontSize=7
FontColor=115,121,148,255
SolidColor=0,0,0,0
X=165
Y=94
AntiAlias=1

[MeterFreeValue]
Meter=String
MeasureName=MeasureRAMFree
FontFace=JetBrains Mono
FontSize=15
FontColor=166,209,137,255
SolidColor=0,0,0,0
X=165
Y=106
AntiAlias=1
AutoScale=1
NumOfDecimals=1
Text=%1B

; ============================================================
; Page File row
; Strict layout: label 20-85 | bar 90-230 | pct 235-280
; All clipped so nothing can overflow into another element
; ============================================================
[MeterPageDivider]
Meter=Shape
Shape=Line 20,142,280,142 | StrokeWidth 1 | Stroke Color 65,69,89,255
X=0
Y=0

[MeterPageLabel]
Meter=String
Text=PAGE FILE
FontFace=JetBrains Mono
FontSize=7
FontColor=115,121,148,255
SolidColor=0,0,0,0
X=20
Y=151
AntiAlias=1
W=65
ClipString=1

[MeterPageBarBg]
Meter=Shape
Shape=Rectangle 90,155,140,5,2 | Fill Color 65,69,89,255 | StrokeWidth 0
X=0
Y=0

[MeterPageBar]
Meter=Bar
MeasureName=MeasurePagePct
X=90
Y=155
W=140
H=5
BarColor=133,193,220,255
BarOrientation=Horizontal
SolidColor=0,0,0,0

[MeterPagePct]
Meter=String
MeasureName=MeasurePagePct
FontFace=JetBrains Mono
FontSize=7
FontColor=133,193,220,255
SolidColor=0,0,0,0
X=238
Y=151
AntiAlias=1
NumOfDecimals=1
W=42
ClipString=1
Text=%1%

; ============================================================
; Total RAM footnote
; ============================================================
[MeterTotalFootnote]
Meter=String
MeasureName=MeasureRAMTotal
FontFace=JetBrains Mono
FontSize=7
FontColor=98,104,128,255
SolidColor=0,0,0,0
X=150
Y=178
StringAlign=Center
AntiAlias=1
AutoScale=1
NumOfDecimals=0
Text=Total: %1B installed
