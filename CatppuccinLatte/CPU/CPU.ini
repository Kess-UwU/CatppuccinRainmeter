; ============================================================
; CatppuccinLatte - CPU.ini  (v1.3)
; CPU usage, per-core bars, frequency, history graph
; Change: Removed "TOTAL" label from ring, bigger % text
; ============================================================

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=CPU
Author=CatppuccinLatte
Version=1.3

[Variables]

; ============================================================
; Background
; ============================================================
[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,300,265,8 | Fill Color 239,241,245,220 | StrokeWidth 1 | Stroke Color 188,192,204,255
X=0
Y=0

; ============================================================
; Section Label
; ============================================================
[MeterSectionLabel]
Meter=String
Text=PROCESSOR
FontFace=JetBrains Mono
FontSize=8
FontColor=156,160,176,255
SolidColor=0,0,0,0
X=20
Y=14
AntiAlias=1

[MeterAccentLine]
Meter=Shape
Shape=Line 20,32,280,32 | StrokeWidth 1 | Stroke Color 230,69,83,60
X=0
Y=0

; ============================================================
; CPU Measures
; ============================================================
[MeasureCPU]
Measure=CPU
Processor=0

[MeasureCPU1]
Measure=CPU
Processor=1

[MeasureCPU2]
Measure=CPU
Processor=2

[MeasureCPU3]
Measure=CPU
Processor=3

[MeasureCPU4]
Measure=CPU
Processor=4

[MeasureCPU5]
Measure=CPU
Processor=5

[MeasureCPU6]
Measure=CPU
Processor=6

[MeasureCPU7]
Measure=CPU
Processor=7

[MeasureCPU8]
Measure=CPU
Processor=8

[MeasureCPUFreq]
Measure=Registry
RegHKey=HKEY_LOCAL_MACHINE
RegKey=HARDWARE\DESCRIPTION\System\CentralProcessor\0
RegValue=~MHz
UpdateDivider=10

; ============================================================
; Donut Ring
; ============================================================
[MeterRingBg]
Meter=Shape
Shape=Arc 62,62,54,54,0,359.9 | StrokeWidth 9 | Stroke Color 204,208,218,255 | Fill Color 0,0,0,0
X=23
Y=32

[MeterRingFill]
Meter=Shape
MeasureName=MeasureCPU
Shape=Arc 62,62,54,54,270,(270+(MeasureCPU*3.6)) | StrokeWidth 9 | Stroke Color 230,69,83,255 | Fill Color 0,0,0,0
X=23
Y=32
Dynamic=1

; Dark fill inside ring — no label, just clean background for the %
[MeterRingInner]
Meter=Shape
Shape=Ellipse 62,62,40,40 | Fill Color 230,233,239,255 | StrokeWidth 0
X=23
Y=32

; ============================================================
; Percentage — large, vertically centered in ring, no label
; FontSize=20 fits comfortably inside a 60px-diameter circle
; ============================================================
[MeterCPUPct]
Meter=String
MeasureName=MeasureCPU
FontFace=JetBrains Mono
FontSize=20
FontColor=76,79,105,255
SolidColor=0,0,0,0
X=85
Y=75
StringAlign=Center
AntiAlias=1
NumOfDecimals=0
Text=%1%

; ============================================================
; Speed — right side
; ============================================================
[MeterFreqLabel]
Meter=String
Text=SPEED
FontFace=JetBrains Mono
FontSize=7
FontColor=156,160,176,255
SolidColor=0,0,0,0
X=165
Y=58
AntiAlias=1

[MeterFreqValue]
Meter=String
MeasureName=MeasureCPUFreq
FontFace=JetBrains Mono
FontSize=18
FontColor=223,142,29,255
SolidColor=0,0,0,0
X=165
Y=72
AntiAlias=1
Text=%1 MHz

; ============================================================
; Per-Core Bars
; ============================================================
[MeterCoreDivider]
Meter=Shape
Shape=Line 20,136,280,136 | StrokeWidth 1 | Stroke Color 204,208,218,255
X=0
Y=0

[MeterCoreTitle]
Meter=String
Text=CORES
FontFace=JetBrains Mono
FontSize=7
FontColor=156,160,176,255
SolidColor=0,0,0,0
X=20
Y=143
AntiAlias=1

[MeterC1Lbl]
