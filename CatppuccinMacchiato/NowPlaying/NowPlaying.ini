; ============================================================
; CatppuccinMacchiato - NowPlaying.ini  (v1.7)
; Uses WebNowPlaying.dll
;
; Written from the OFFICIAL docs at wnp.keifufu.dev/rainmeter/usage
;
; KEY FACTS from docs:
;   PlayerType=Status   -> 0 = no connections, 1 = connected
;   PlayerType=State    -> 0 = stopped, 1 = playing, 2 = paused
;   PlayerType=Cover    -> returns LOCAL FILE PATH to cover art
;                          only extra option is DefaultPath=
;                          (there is NO CoverPath option)
;   PlayerType=Progress -> percentage 0-100 (NOT 0-1)
;   PlayerType=Duration -> string "(HH):MM:SS", number = seconds
;   PlayerType=Position -> string "(HH):MM:SS", number = seconds
;   Bangs can be sent to ANY WebNowPlaying measure
; ============================================================

[Rainmeter]
Update=500
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=NowPlaying
Author=CatppuccinMacchiato
Version=1.7

[Variables]

; ============================================================
; Background
; ============================================================
[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,300,205,8 | Fill Color 36,39,58,220 | StrokeWidth 1 | Stroke Color 73,77,100,255
X=0
Y=0

; ============================================================
; Section Label
; ============================================================
[MeterSectionLabel]
Meter=String
Text=NOW PLAYING
FontFace=JetBrains Mono
FontSize=8
FontColor=110,115,141,255
SolidColor=0,0,0,0
X=20
Y=14
AntiAlias=1

[MeterAccentLine]
Meter=Shape
Shape=Line 20,32,280,32 | StrokeWidth 1 | Stroke Color 166,218,149,60
X=0
Y=0

; ============================================================
; Measures — from official docs
; ============================================================

; Status: 0 = no connections, 1 = active connection
[MeasureStatus]
Measure=Plugin
Plugin=WebNowPlaying-x64
PlayerType=Status

; State: 0 = stopped, 1 = playing, 2 = paused
[MeasureState]
Measure=Plugin
Plugin=WebNowPlaying-x64
PlayerType=State

[MeasureTitle]
Measure=Plugin
Plugin=WebNowPlaying-x64
PlayerType=Title

[MeasureArtist]
Measure=Plugin
Plugin=WebNowPlaying-x64
PlayerType=Artist

[MeasureAlbum]
Measure=Plugin
Plugin=WebNowPlaying-x64
PlayerType=Album

; Cover: returns local file path. DefaultPath= is the ONLY valid extra option.
; No CoverPath option exists. The plugin handles where it saves the file.
[MeasureCover]
Measure=Plugin
Plugin=WebNowPlaying-x64
PlayerType=Cover
DefaultPath=#@#cover_default.png

; Progress: 0-100 percentage (NOT 0-1)
[MeasureProgress]
Measure=Plugin
Plugin=WebNowPlaying-x64
PlayerType=Progress

; Position/Duration: string value = "(HH):MM:SS"
[MeasurePosition]
Measure=Plugin
Plugin=WebNowPlaying-x64
PlayerType=Position

[MeasureDuration]
Measure=Plugin
Plugin=WebNowPlaying-x64
PlayerType=Duration

; ============================================================
; Visibility control
; Show track content when Status=1, hide when Status=0
; ============================================================
[MeasureVisibility]
Measure=Calc
Formula=MeasureStatus
IfCondition=MeasureStatus = 1
IfTrueAction=[!ShowMeterGroup Playing][!HideMeter MeterIdle][!Redraw]
IfFalseAction=[!HideMeterGroup Playing][!ShowMeter MeterIdle][!Redraw]
DynamicVariables=1

; ============================================================
; Album Art
; MeasureName= reads the file path returned by MeasureCover
; ============================================================
[MeterCoverBg]
Meter=Shape
Group=Playing
Shape=Rectangle 20,42,70,70,4 | Fill Color 30,32,48,255 | StrokeWidth 1 | Stroke Color 73,77,100,255
X=0
Y=0
Hidden=1

[MeterCover]
Meter=Image
Group=Playing
MeasureName=MeasureCover
X=20
Y=42
W=70
H=70
PreserveAspectRatio=1
AntiAlias=1
Hidden=1

; ============================================================
; Track Info
; ============================================================
[MeterTitle]
Meter=String
Group=Playing
MeasureName=MeasureTitle
FontFace=JetBrains Mono
FontSize=11
FontColor=202,211,245,255
SolidColor=0,0,0,0
X=102
Y=44
W=182
ClipString=1
AntiAlias=1
StringStyle=Bold
Hidden=1

[MeterArtist]
Meter=String
Group=Playing
MeasureName=MeasureArtist
FontFace=JetBrains Mono
FontSize=10
FontColor=184,192,224,255
SolidColor=0,0,0,0
X=102
Y=63
W=182
ClipString=1
AntiAlias=1
Hidden=1

[MeterAlbum]
Meter=String
Group=Playing
MeasureName=MeasureAlbum
FontFace=JetBrains Mono
FontSize=8
FontColor=110,115,141,255
SolidColor=0,0,0,0
X=102
Y=80
W=182
ClipString=1
AntiAlias=1
Hidden=1

; ============================================================
; Progress Bar
; Progress is 0-100, Bar meter MaxValue defaults to 100 — correct
; ============================================================
[MeterProgBg]
Meter=Shape
Group=Playing
Shape=Rectangle 20,125,260,4,2 | Fill Color 54,58,79,255 | StrokeWidth 0
X=0
Y=0
Hidden=1

[MeterProgFill]
Meter=Bar
Group=Playing
MeasureName=MeasureProgress
X=20
Y=125
W=260
H=4
BarColor=166,218,149,255
BarOrientation=Horizontal
SolidColor=0,0,0,0
Hidden=1

; ============================================================
; Time stamps — string value is already (HH):MM:SS formatted
; ============================================================
[MeterPosition]
Meter=String
Group=Playing
MeasureName=MeasurePosition
FontFace=JetBrains Mono
FontSize=8
FontColor=147,154,183,255
SolidColor=0,0,0,0
X=20
Y=134
AntiAlias=1
Hidden=1

[MeterDuration]
Meter=String
Group=Playing
MeasureName=MeasureDuration
FontFace=JetBrains Mono
FontSize=8
FontColor=147,154,183,255
SolidColor=0,0,0,0
X=280
Y=134
StringAlign=Right
AntiAlias=1
Hidden=1

; ============================================================
; Controls — bang can target any WNP measure (using MeasureTitle)
; ============================================================
[MeterPrev]
Meter=String
Text=|<
FontFace=JetBrains Mono
FontSize=14
FontColor=147,154,183,255
SolidColor=0,0,0,0
X=90
Y=155
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureTitle "Previous"]
MouseOverAction=[!SetOption MeterPrev FontColor "202,211,245,255"][!UpdateMeter MeterPrev][!Redraw]
MouseLeaveAction=[!SetOption MeterPrev FontColor "147,154,183,255"][!UpdateMeter MeterPrev][!Redraw]

[MeterPlay]
Meter=String
Text=||
FontFace=JetBrains Mono
FontSize=17
FontColor=166,218,149,255
SolidColor=0,0,0,0
X=142
Y=153
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureTitle "PlayPause"]
MouseOverAction=[!SetOption MeterPlay FontColor "202,211,245,255"][!UpdateMeter MeterPlay][!Redraw]
MouseLeaveAction=[!SetOption MeterPlay FontColor "166,218,149,255"][!UpdateMeter MeterPlay][!Redraw]

[MeterNext]
Meter=String
Text=>|
FontFace=JetBrains Mono
FontSize=14
FontColor=147,154,183,255
SolidColor=0,0,0,0
X=190
Y=155
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureTitle "Next"]
MouseOverAction=[!SetOption MeterNext FontColor "202,211,245,255"][!UpdateMeter MeterNext][!Redraw]
MouseLeaveAction=[!SetOption MeterNext FontColor "147,154,183,255"][!UpdateMeter MeterNext][!Redraw]

; ============================================================
; Idle — only visible when Status = 0 (no connection)
; Starts visible, MeasureVisibility hides it when connected
; ============================================================
[MeterIdle]
Meter=String
Text=Nothing playing
FontFace=JetBrains Mono
FontSize=10
FontColor=91,96,120,255
SolidColor=0,0,0,0
X=150
Y=88
StringAlign=Center
AntiAlias=1
