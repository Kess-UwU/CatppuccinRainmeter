; ============================================================
; CatppuccinMacchiato - Clock.ini  (v1.1 - fixed layout)
; Digital Clock Skin - Catppuccin Macchiato Theme
; ============================================================

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Clock
Author=CatppuccinMacchiato
Information=Digital clock with date display
License=MIT
Version=1.1

[Variables]
@include=#@#Variables.inc
PanelHeight=150

; ============================================================
; Background
; ============================================================
[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,300,150,8 | Fill Color 36,39,58,220 | StrokeWidth 1 | Stroke Color 73,77,100,255
X=0
Y=0

; ============================================================
; Section Label  (plain text, no Nerd Font icons)
; ============================================================
[MeterSectionLabel]
Meter=String
Text=CLOCK
FontFace=JetBrains Mono
FontSize=8
FontColor=100,112,134,255
SolidColor=0,0,0,0
X=20
Y=14
AntiAlias=1

; ============================================================
; Accent Line
; ============================================================
[MeterAccentLine]
Meter=Shape
Shape=Line 20,32,280,32 | StrokeWidth 1 | Stroke Color 198,160,246,60
X=0
Y=0

; ============================================================
; Time Measures
; ============================================================
[MeasureTime]
Measure=Time
Format=%H:%M:%S

[MeasureDate]
Measure=Time
Format=%A, %B %d

[MeasureYear]
Measure=Time
Format=%Y

; ============================================================
; Time Display  -- single string keeps everything in bounds
; ============================================================
[MeterTime]
Meter=String
MeasureName=MeasureTime
FontFace=JetBrains Mono
FontSize=42
FontColor=202,211,245,255
SolidColor=0,0,0,0
X=150
Y=40
StringAlign=Center
AntiAlias=1

; ============================================================
; Date Display
; ============================================================
[MeterDate]
Meter=String
MeasureName=MeasureDate
FontFace=JetBrains Mono
FontSize=11
FontColor=184,192,224,255
SolidColor=0,0,0,0
X=20
Y=105
AntiAlias=1

[MeterYear]
Meter=String
MeasureName=MeasureYear
FontFace=JetBrains Mono
FontSize=11
FontColor=100,112,134,255
SolidColor=0,0,0,0
X=280
Y=105
StringAlign=Right
AntiAlias=1
