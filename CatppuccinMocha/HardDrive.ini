; ============================================================
; CatppuccinMocha - HardDrive.ini  (v1.2)
; Hard Drive / Storage - Catppuccin Mocha Theme
;
; NOTE: @include is intentionally NOT used here.
; The Variables.inc contains a variable named "Text" which
; Rainmeter interprets as the meter Text= property, causing
; the "o°~STORAGE" garbled label bug. Colors are hardcoded.
; ============================================================

[Rainmeter]
Update=5000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=HardDrive
Author=CatppuccinMocha
Version=1.2

[Variables]
Drive1=C:
Drive2=G:

; ============================================================
; Background
; ============================================================
[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,300,155,8 | Fill Color 30,30,46,220 | StrokeWidth 1 | Stroke Color 69,71,90,255
X=0
Y=0

; ============================================================
; Section Label
; ============================================================
[MeterSectionLabel]
Meter=String
Text=STORAGE
FontFace=JetBrains Mono
FontSize=8
FontColor=108,112,134,255
SolidColor=0,0,0,0
X=20
Y=14
AntiAlias=1

[MeterAccentLine]
Meter=Shape
Shape=Line 20,32,280,32 | StrokeWidth 1 | Stroke Color 250,179,135,60
X=0
Y=0

; ============================================================
; Drive C:
; ============================================================
[MeasureC_Used]
Measure=FreeDiskSpace
Drive=#Drive1#\
Type=Used

[MeasureC_Free]
Measure=FreeDiskSpace
Drive=#Drive1#\

[MeasureC_Total]
Measure=FreeDiskSpace
Drive=#Drive1#\
Total=1

[MeasureC_Pct]
Measure=Calc
Formula=(MeasureC_Used / MeasureC_Total) * 100
MaxValue=100

[MeterC_Label]
Meter=String
Text=#Drive1#
FontFace=JetBrains Mono
FontSize=10
FontColor=250,179,135,255
SolidColor=0,0,0,0
X=20
Y=40
AntiAlias=1
StringStyle=Bold

[MeterC_PctVal]
Meter=String
MeasureName=MeasureC_Pct
FontFace=JetBrains Mono
FontSize=10
FontColor=205,214,244,255
SolidColor=0,0,0,0
X=280
Y=40
StringAlign=Right
AntiAlias=1
NumOfDecimals=1
Text=%1%

[MeterC_BarBg]
Meter=Shape
Shape=Rectangle 20,56,260,5,2 | Fill Color 49,50,68,255 | StrokeWidth 0
X=0
Y=0

[MeterC_Bar]
Meter=Bar
MeasureName=MeasureC_Pct
X=20
Y=56
W=260
H=5
BarColor=250,179,135,255
BarOrientation=Horizontal
SolidColor=0,0,0,0

[MeterC_Detail]
Meter=String
MeasureName=MeasureC_Free
FontFace=JetBrains Mono
FontSize=8
FontColor=108,112,134,255
SolidColor=0,0,0,0
X=20
Y=65
AntiAlias=1
AutoScale=1
NumOfDecimals=1
Text=Free: %1B

[MeterC_DetailTotal]
Meter=String
MeasureName=MeasureC_Total
FontFace=JetBrains Mono
FontSize=8
FontColor=108,112,134,255
SolidColor=0,0,0,0
X=280
Y=65
StringAlign=Right
AntiAlias=1
AutoScale=1
NumOfDecimals=1
Text=Total: %1B

; ============================================================
; Drive G:
; ============================================================
[MeasureD_Used]
Measure=FreeDiskSpace
Drive=#Drive2#\
Type=Used

[MeasureD_Free]
Measure=FreeDiskSpace
Drive=#Drive2#\

[MeasureD_Total]
Measure=FreeDiskSpace
Drive=#Drive2#\
Total=1

[MeasureD_Pct]
Measure=Calc
Formula=(MeasureD_Used / MeasureD_Total) * 100
MaxValue=100

[MeterD_Label]
Meter=String
Text=#Drive2#
FontFace=JetBrains Mono
FontSize=10
FontColor=250,179,135,255
SolidColor=0,0,0,0
X=20
Y=90
AntiAlias=1
StringStyle=Bold

[MeterD_PctVal]
Meter=String
MeasureName=MeasureD_Pct
FontFace=JetBrains Mono
FontSize=10
FontColor=205,214,244,255
SolidColor=0,0,0,0
X=280
Y=90
StringAlign=Right
AntiAlias=1
NumOfDecimals=1
Text=%1%

[MeterD_BarBg]
Meter=Shape
Shape=Rectangle 20,106,260,5,2 | Fill Color 49,50,68,255 | StrokeWidth 0
X=0
Y=0

[MeterD_Bar]
Meter=Bar
MeasureName=MeasureD_Pct
X=20
Y=106
W=260
H=5
BarColor=250,179,135,180
BarOrientation=Horizontal
SolidColor=0,0,0,0

[MeterD_Detail]
Meter=String
MeasureName=MeasureD_Free
FontFace=JetBrains Mono
FontSize=8
FontColor=108,112,134,255
SolidColor=0,0,0,0
X=20
Y=115
AntiAlias=1
AutoScale=1
NumOfDecimals=1
Text=Free: %1B

[MeterD_DetailTotal]
Meter=String
MeasureName=MeasureD_Total
FontFace=JetBrains Mono
FontSize=8
FontColor=108,112,134,255
SolidColor=0,0,0,0
X=280
Y=115
StringAlign=Right
AntiAlias=1
AutoScale=1
NumOfDecimals=1
Text=Total: %1B

; ============================================================
; Last Updated
; ============================================================
[MeasureUpdateTime]
Measure=Time
Format=%H:%M:%S

[MeterUpdated]
Meter=String
MeasureName=MeasureUpdateTime
FontFace=JetBrains Mono
FontSize=7
FontColor=88,91,112,255
SolidColor=0,0,0,0
X=150
Y=140
StringAlign=Center
AntiAlias=1
Text=Updated %1
